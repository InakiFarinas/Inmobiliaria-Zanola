{% extends 'base.html' %}
{% block title %}Propiedades{% endblock %}
{% block content %}
<h2>Listado de propiedades</h2>
<ul>
    {% for propiedad in propiedades %}
        <li><a href="/propiedad/{{ propiedad.id }}">{{ propiedad.titulo }}</a> - ${{ propiedad.precio }}</li>
    {% endfor %}
</ul>
{% endblock %}
