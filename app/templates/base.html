<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Inmobiliaria{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.svg') }}">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid d-flex justify-content-between align-items-center position-relative">
                
                <!-- Izquierda: Marca -->
                <a class="navbar-brand" href="/">Inmobiliaria</a>

                <!-- Botón hamburguesa -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Centro: navegación -->
                <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/propiedades">Propiedades</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/contacto">Contacto</a>
                        </li>
                    </ul>
                </div>

                <!-- Derecha: redes -->
                <div class="d-none d-lg-flex align-items-center gap-3">
                    {% for red in ['facebook', 'instagram', 'twitter'] %}
                    <a class="nav-link" href="https://{{ red }}.com" target="_blank" aria-label="{{ red }}">
                        <img src="{{ url_for('static', filename='img/' + red + '.svg') }}" alt="{{ red }}" width="20" height="20">
                    </a>
                    {% endfor %}
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2025 Inmobiliaria. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
